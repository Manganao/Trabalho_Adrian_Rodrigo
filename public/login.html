<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYMSYNC - Login</title>
   <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="login-container">
    <img src="imagens/logo_gymsync.jpeg" alt="GYMSYNC Logo" class="logo">

    <input type="text" class="input-field" placeholder="E-mail ou Usuário">
    <input type="password" class="input-field" placeholder="Senha">

    <button class="btn">Entrar</button>

    <div class="links">
      <a href="#">Esqueceu a senha?</a> | <a href="#">Criar conta</a>
    </div>

    <div class="social-login">
      <a href="#" class="social-btn">Entrar com Google</a>
      <a href="#" class="social-btn">Entrar com Apple</a>
    </div>
  </div>

</body>
</html>
