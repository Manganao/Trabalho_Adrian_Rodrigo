<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erro 404 - Página não encontrada</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #333;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    img {
      width: 100%;
      max-width: 200px;
      height: auto;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 5em;
      margin: 0;
      color: #e53935;
    }

    h2 {
      margin: 10px 0;
      font-size: 1.8em;
    }

    p {
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      padding: 10px 20px;
      background-color: #e53935;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    a:hover {
      background-color: #c62828;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="imagens/404_laranja.jpg" alt="Logo da Academia">

    <h1>404</h1>
    <h2>Oops! Página não encontrada</h2>
    <p>Parece que essa página saiu para malhar e não voltou!<br>
    Volte para a nossa página principal e continue seu treino conosco.</p>
    <a href="/">Voltar para a Home</a>
  </div>
</body>
</html>
